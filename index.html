<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Garage Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#232323;--border:#2e2e2e;
  --accent:#f0a500;--accent-dim:rgba(240,165,0,0.12);--text:#f0ede8;
  --muted:#888;--success:#3dd68c;--danger:#ff5f5f;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100dvh;display:flex;flex-direction:column}
header{padding:20px 20px 0;display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:20px;height:20px}
.brand{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;letter-spacing:0.04em;text-transform:uppercase}
.brand span{color:var(--accent)}
.config-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;margin-left:auto;display:flex;align-items:center}
.config-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.search-wrap{padding:24px 20px 0}
.search-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.search-box{display:flex;gap:10px}
#plate-input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:14px 18px;outline:none;transition:border-color 0.2s;caret-color:var(--accent)}
#plate-input::placeholder{color:#3a3a3a}
#plate-input:focus{border-color:var(--accent)}
#search-btn{background:var(--accent);border:none;border-radius:var(--radius);width:58px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s}
#search-btn:active{transform:scale(0.95);background:#d49200}
#search-btn svg{width:22px;height:22px;stroke:#000;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
#status{padding:14px 20px 0;font-size:13px;color:var(--muted);min-height:36px;display:flex;align-items:center;gap:8px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
#result{padding:16px 20px;flex:1}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;animation:slideUp 0.25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-header{background:var(--surface2);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.plate-badge{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;letter-spacing:0.1em;color:var(--accent)}
.fields{padding:6px 0}
.field-row{display:flex;align-items:flex-start;padding:11px 18px;border-bottom:1px solid var(--border);gap:12px}
.field-row:last-child{border-bottom:none}
.field-icon{width:32px;height:32px;background:var(--accent-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.field-icon svg{width:15px;height:15px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.field-label{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;font-family:'Barlow Condensed',sans-serif}
.field-value{font-size:15px;color:var(--text);font-weight:500;line-height:1.4}
.field-value.empty{color:#444;font-style:italic;font-weight:400}
.field-row.highlight .field-icon{background:rgba(61,214,140,0.12)}
.field-row.highlight .field-icon svg{stroke:var(--success)}
.field-row.highlight .field-value{color:var(--success)}
.field-row.overdue .field-icon{background:rgba(255,95,95,0.12)}
.field-row.overdue .field-icon svg{stroke:var(--danger)}
.field-row.overdue .field-value{color:var(--danger)}
.not-found{text-align:center;padding:48px 20px;animation:slideUp 0.2s ease}
.not-found-icon{width:56px;height:56px;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.not-found-icon svg{width:24px;height:24px;stroke:var(--muted);fill:none;stroke-width:1.5}
.not-found h3{font-size:17px;margin-bottom:6px}
.not-found p{font-size:14px;color:var(--muted)}
.images-section{padding:12px 18px 14px;border-top:1px solid var(--border)}
.images-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-family:'Barlow Condensed',sans-serif}
.images-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.images-grid.single{grid-template-columns:1fr}
.img-thumb-wrap{position:relative;border-radius:10px;overflow:hidden;background:var(--surface2);aspect-ratio:4/3;cursor:pointer;border:1px solid var(--border)}
.img-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.img-thumb-wrap:active{opacity:0.8}
.img-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:20px 8px 7px;font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.06em;text-transform:uppercase;color:#fff}
.img-error{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:12px;padding:10px;text-align:center}
.img-error svg{width:24px;height:24px;stroke:var(--muted);fill:none;stroke-width:1.5}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;animation:fadeIn 0.15s ease;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lightbox img{max-width:100%;max-height:80dvh;border-radius:10px;object-fit:contain}
.lightbox-caption{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-top:12px}
.lightbox-close{position:absolute;top:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.lightbox-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;z-index:100;animation:fadeIn 0.15s ease}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;border-top:1px solid var(--border);animation:slideUp 0.2s ease;max-height:85dvh;overflow-y:auto}
.modal h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:6px;font-family:'Barlow Condensed',sans-serif}
.modal-field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:11px 14px;outline:none;transition:border-color 0.2s}
.modal-field input:focus{border-color:var(--accent)}
.modal-hint{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:18px;background:var(--surface2);border-radius:10px;padding:12px 14px;border-left:3px solid var(--accent)}
.modal-hint code{background:var(--border);border-radius:4px;padding:1px 5px;font-size:11px;color:var(--accent)}
.modal-actions{display:flex;gap:10px;margin-top:6px}
.btn-save{flex:1;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:14px;cursor:pointer}
.btn-cancel{background:var(--surface2);color:var(--muted);border:1.5px solid var(--border);border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;padding:14px 20px;cursor:pointer}
.recent{padding:16px 20px 0}
.recent-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-family:'Barlow Condensed',sans-serif}
.recent-chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.08em;color:var(--text);padding:6px 12px;cursor:pointer}
.chip:active{border-color:var(--accent);color:var(--accent)}

/* ── Repair Log ── */
.repair-section{padding:14px 18px;border-top:2px solid var(--border)}
.repair-section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.repair-count{background:var(--accent-dim);color:var(--accent);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700}
.repair-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.repair-card:last-child{margin-bottom:0}
.repair-card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);gap:8px}
.repair-date{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:0.04em}
.repair-tech{font-size:12px;color:var(--muted)}
.repair-km{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}
.repair-body{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.repair-field-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;font-family:'Barlow Condensed',sans-serif}
.repair-field-value{font-size:14px;color:var(--text);font-weight:500;line-height:1.4}
.repair-cost{display:inline-block;background:var(--accent-dim);color:var(--accent);border-radius:6px;padding:3px 10px;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.04em}
.no-repairs{text-align:center;padding:16px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<header>
  <div class="logo-mark">
    <svg viewBox="0 0 20 20" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="10" r="7"/><path d="M10 6v4l2.5 2.5"/>
    </svg>
  </div>
  <div class="brand">Garage <span>Lookup</span></div>
  <button class="config-btn" onclick="openConfig()">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</header>

<div class="search-wrap">
  <div class="search-label">Plate number</div>
  <div class="search-box">
    <input id="plate-input" type="text" placeholder="e.g. 362546" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')doSearch()">
    <button id="search-btn" onclick="doSearch()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
  </div>
</div>

<div id="status"></div>
<div id="result"></div>
<div id="recent-wrap"></div>

<div id="modal" style="display:none">
  <div class="modal-backdrop" onclick="if(event.target===this)closeConfig()">
    <div class="modal">
      <h2>Settings</h2>
      <div class="modal-hint">
        Share your Google Sheet as <strong>"Anyone with the link — Viewer"</strong>, then paste the Sheet ID from the URL below.
      </div>
      <div class="modal-field"><label>Google Sheet ID</label><input id="cfg-sid" type="text"></div>
      <div class="modal-field"><label>Sheet Tab Name</label><input id="cfg-sname" type="text"></div>
      <div class="modal-field"><label>Plate / Vehicle Number Column</label><input id="cfg-plate" type="text"></div>
      <div class="modal-field"><label>Owner (Rider Name) Column</label><input id="cfg-owner" type="text"></div>
      <div class="modal-field"><label>Rider ID Column</label><input id="cfg-rider" type="text"></div>
      <div class="modal-field"><label>Last Service Column</label><input id="cfg-svc" type="text"></div>
      <div class="modal-field"><label>KM Reading Column</label><input id="cfg-km" type="text"></div>
      <div class="modal-field"><label>Next Service Due Column</label><input id="cfg-next" type="text"></div>
      <div class="modal-field"><label>Notes / Any Issue Column</label><input id="cfg-notes" type="text"></div>
      <div class="modal-field"><label>Odometer Photo Column</label><input id="cfg-photo" type="text"></div>
      <div class="modal-field"><label>Repair Log Tab Name</label><input id="cfg-rtab" type="text"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeConfig()">Cancel</button>
        <button class="btn-save" onclick="saveConfig()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const SK = 'glookup_v1';

function defaultCfg() {
  return {
    sheetId:   '1MqdzUn8pkuW8_mER_7p4mPoa-K9cRhiqX9x1QK3CU_Y',
    sheetName: 'Form Responses 1',
    repairTab: 'Repair Logs',
    cols: {
      plate:       'Vehicle Number',
      owner:       'Rider Name',
      riderId:     'Rider ID',
      lastService: 'Last service date & KM',
      km:          'KM reading',
      nextService: '',
      notes:       'Any issue',
      photo:       ''
    }
  };
}

function loadCfg() {
  try { return JSON.parse(localStorage.getItem(SK)) || defaultCfg(); }
  catch { return defaultCfg(); }
}
function saveCfg(c) { localStorage.setItem(SK, JSON.stringify(c)); }

function loadRecent() {
  try { return JSON.parse(localStorage.getItem(SK+'_r')) || []; }
  catch { return []; }
}
function addRecent(p) {
  let r = loadRecent().filter(x => x !== p);
  r.unshift(p); r = r.slice(0,6);
  localStorage.setItem(SK+'_r', JSON.stringify(r));
}

function openConfig() {
  const c = loadCfg();
  document.getElementById('cfg-sid').value   = c.sheetId;
  document.getElementById('cfg-sname').value = c.sheetName;
  document.getElementById('cfg-plate').value = c.cols.plate;
  document.getElementById('cfg-owner').value = c.cols.owner;
  document.getElementById('cfg-rider').value = c.cols.riderId;
  document.getElementById('cfg-svc').value   = c.cols.lastService;
  document.getElementById('cfg-km').value    = c.cols.km;
  document.getElementById('cfg-next').value  = c.cols.nextService;
  document.getElementById('cfg-notes').value = c.cols.notes;
  document.getElementById('cfg-photo').value = c.cols.photo;
  document.getElementById('cfg-rtab').value  = c.repairTab || 'Repair Logs';
  document.getElementById('modal').style.display = 'flex';
}
function closeConfig() { document.getElementById('modal').style.display = 'none'; }
function saveConfig() {
  saveCfg({
    sheetId:   document.getElementById('cfg-sid').value.trim(),
    sheetName: document.getElementById('cfg-sname').value.trim(),
    cols: {
      plate:       document.getElementById('cfg-plate').value.trim(),
      owner:       document.getElementById('cfg-owner').value.trim(),
      riderId:     document.getElementById('cfg-rider').value.trim(),
      lastService: document.getElementById('cfg-svc').value.trim(),
      km:          document.getElementById('cfg-km').value.trim(),
      nextService: document.getElementById('cfg-next').value.trim(),
      notes:       document.getElementById('cfg-notes').value.trim(),
      photo:       ''
    }
  });
  closeConfig();
  setStatus('Settings saved.');
}

async function fetchSheet(id, name) {
  const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Cannot reach Google Sheets. Check sharing settings.');
  const t = await r.text();
  return JSON.parse(t.substring(47, t.length - 2));
}

function parseRows(json) {
  const cols = json.table.cols.map(c => c.label || c.id);
  return json.table.rows.map(r =>
    Object.fromEntries(cols.map((c,i) => [c, r.c && r.c[i] ? (r.c[i].f || r.c[i].v || '') : '']))
  );
}

function fmtDate(val) {
  if (!val) return '';
  const s = String(val);
  // Google gviz Date(yyyy,m,d) — month is 0-indexed
  const m = s.match(/Date\((\d+),(\d+),(\d+)/);
  if (m) {
    const d = new Date(+m[1], +m[2], +m[3]);
    return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  }
  // Plain string dates like "1/27/2026"
  if (/\d{1,2}\/\d{1,2}\/\d{4}/.test(s)) {
    const d = new Date(s);
    if (!isNaN(d)) return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  }
  return s;
}

function driveThumb(url) {
  if (!url) return '';
  const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  const id = (m1 && m1[1]) || (m2 && m2[1]);
  return id ? `https://lh3.googleusercontent.com/d/${id}=w800` : url;
}

function openLightbox(url, cap) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<button class="lightbox-close" onclick="this.parentElement.remove()"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button><img src="${url}" alt="${cap}"><div class="lightbox-caption">${cap}</div>`;
  lb.onclick = e => { if (e.target === lb) lb.remove(); };
  document.body.appendChild(lb);
}

async function fetchRepairs(sheetId, repairTab, plate) {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(repairTab)}`;
    const r = await fetch(url);
    if (!r.ok) return [];
    const t = await r.text();
    const json = JSON.parse(t.substring(47, t.length - 2));
    const cols = json.table.cols.map(c => c.label || c.id);
    const rows = json.table.rows.map(r =>
      Object.fromEntries(cols.map((c,i) => [c, r.c && r.c[i] ? (r.c[i].f || r.c[i].v || '') : '']))
    );
    return rows.filter(r => String(r['Vehicle Number']||'').trim().toUpperCase() === plate);
  } catch(e) { return []; }
}

function renderRepairLog(repairs) {
  if (!repairs.length) {
    return `<div class="repair-section">
      <div class="repair-section-title">Repair history</div>
      <div class="no-repairs">No repair records found</div>
    </div>`;
  }
  // Sort newest first
  const sorted = [...repairs].sort((a,b) => {
    const da = new Date(a['Date of Visit']||0);
    const db = new Date(b['Date of Visit']||0);
    return db - da;
  });
  const cards = sorted.map(r => {
    const date    = fmtDate(r['Date of Visit']) || r['Date of Visit'] || '—';
    const work    = r['Work Performed'] || '';
    const parts   = r['Parts Replaced'] || '';
    const km      = r['KM at visit'] || '';
    const tech    = r['Technician Name'] || '';
    const cost    = r['Cost/s'] || '';
    const notes   = r['Notes'] || '';
    return `<div class="repair-card">
      <div class="repair-card-header">
        <div>
          <div class="repair-date">${date}</div>
          ${tech ? `<div class="repair-tech">${tech}</div>` : ''}
        </div>
        ${km ? `<div class="repair-km">${km} KM</div>` : ''}
      </div>
      <div class="repair-body">
        ${work  ? `<div><div class="repair-field-label">Work performed</div><div class="repair-field-value">${work}</div></div>` : ''}
        ${parts ? `<div><div class="repair-field-label">Parts replaced</div><div class="repair-field-value">${parts}</div></div>` : ''}
        ${cost  ? `<div><div class="repair-field-label">Cost</div><div class="repair-cost">${cost}</div></div>` : ''}
        ${notes ? `<div><div class="repair-field-label">Notes</div><div class="repair-field-value">${notes}</div></div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `<div class="repair-section">
    <div class="repair-section-title">Repair history <span class="repair-count">${repairs.length}</span></div>
    ${cards}
  </div>`;
}

async function doSearch() {
  const plate = document.getElementById('plate-input').value.trim().toUpperCase();
  if (!plate) return;
  const cfg = loadCfg();
  if (!cfg.sheetId) { openConfig(); return; }

  setStatus('<span class="spinner"></span> Looking up ' + plate + '…');
  document.getElementById('result').innerHTML = '';

  try {
    const json = await fetchSheet(cfg.sheetId, cfg.sheetName);
    const rows = parseRows(json);
    const match = rows.find(r =>
      String(r[cfg.cols.plate] || '').trim().toUpperCase() === plate
    );
    if (!match) { setStatus(''); renderNotFound(plate); return; }
    const repairs = await fetchRepairs(cfg.sheetId, cfg.repairTab || 'Repair Logs', plate);
    addRecent(plate);
    renderRecent();
    setStatus('');
    renderResult(match, plate, cfg.cols, repairs);
  } catch(e) {
    setStatus('Error: ' + e.message);
  }
}

function renderResult(row, plate, cols, repairs) {
  const g = k => String(row[cols[k]] || '').trim();
  const isOverdue = g('nextService') && new Date(g('nextService')) < new Date();

  const fields = [
    { k:'owner',       label:'Owner',           icon:personSvg() },
    { k:'riderId',     label:'Rider ID',        icon:idSvg() },
    { k:'lastService', label:'Last service',    icon:calSvg(), fmt:fmtDate },
    { k:'km',          label:'Current KM',      icon:speedoSvg() },
    { k:'nextService', label:'Next service due',icon:calSvg(), fmt:fmtDate, cls: isOverdue ? 'overdue' : 'highlight' },
    { k:'notes',       label:'Notes',           icon:noteSvg() },
  ];

  const rows = fields.map(f => {
    let val = g(f.k);
    if (f.fmt) val = f.fmt(val) || val;
    const cls = (f.cls && val) ? ` ${f.cls}` : '';
    return `<div class="field-row${cls}">
      <div class="field-icon">${f.icon}</div>
      <div><div class="field-label">${f.label}</div>
      <div class="field-value${!val?' empty':''}">${val||'—'}</div></div>
    </div>`;
  }).join('');

  const photoUrl = g('photo');
  const thumbUrl = driveThumb(photoUrl);
  const photoHtml = thumbUrl ? `
    <div class="images-section">
      <div class="images-label">Photos</div>
      <div class="images-grid single">
        <div class="img-thumb-wrap" onclick="openLightbox('${thumbUrl}','Odometer')">
          <img src="${thumbUrl}" alt="Odometer"
            onerror="this.parentElement.innerHTML='<div class=\\"img-error\\"><svg viewBox=\\"0 0 24 24\\"><circle cx=\\"11\\" cy=\\"11\\" r=\\"8\\"/><path d=\\"m21 21-4.35-4.35\\"/></svg>Photo unavailable<br><small>Check Drive sharing</small></div>'">
          <div class="img-caption">Odometer</div>
        </div>
      </div>
    </div>` : '';

  document.getElementById('result').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="plate-badge">${plate}</div>
      </div>
      <div class="fields">${rows}</div>
      ${photoHtml}
      ${renderRepairLog(repairs || [])}
    </div>`;"

}

function renderNotFound(plate) {
  document.getElementById('result').innerHTML = `
    <div class="not-found">
      <div class="not-found-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
      <h3>Not found</h3><p>No record for <strong>${plate}</strong></p>
    </div>`;
}

function renderRecent() {
  const r = loadRecent();
  document.getElementById('recent-wrap').innerHTML = r.length ? `
    <div class="recent"><div class="recent-label">Recent</div>
    <div class="recent-chips">${r.map(p=>`<div class="chip" onclick="searchPlate('${p}')">${p}</div>`).join('')}</div>
    </div>` : '';
}

function searchPlate(p) { document.getElementById('plate-input').value=p; doSearch(); }
function setStatus(h) { document.getElementById('status').innerHTML = h; }

function calSvg()    { return `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`; }
function speedoSvg() { return `<svg viewBox="0 0 24 24"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0-18 0"/><path d="M12 12l4-4"/><circle cx="12" cy="12" r="1" fill="var(--accent)" stroke="none"/></svg>`; }
function noteSvg()   { return `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`; }
function personSvg() { return `<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`; }
function idSvg()     { return `<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3h2a2 2 0 0 1 2 2v2M6 3H4a2 2 0 0 0-2 2v2"/><circle cx="9" cy="14" r="2"/><path d="M15 12h2M15 16h2M5 18c0-2 1.5-3 4-3s4 1 4 3"/></svg>`; }

renderRecent();
document.getElementById('plate-input').focus();
</script>
</body>
</html>
